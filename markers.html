<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マーカー印刷ページ｜院内案内ARデモ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f4f8;
      padding: 32px;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 8px;
      color: #1a2235;
    }
    .sub {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .markers {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }
    .marker-sheet {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      width: 280px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .marker-qr {
      width: 200px;
      height: 200px;
      background: #1a2235;
      border-radius: 8px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      position: relative;
      overflow: hidden;
    }
    .qr-pattern {
      position: absolute;
      inset: 8px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .qr-cell {
      background: #fff;
      border-radius: 1px;
    }
    .qr-cell.dark { background: #1a2235; }
    .marker-id {
      font-size: 18px;
      font-weight: 700;
      color: #1a2235;
      margin-bottom: 4px;
      font-family: monospace;
    }
    .marker-name {
      font-size: 14px;
      color: #444;
      margin-bottom: 12px;
    }
    .marker-label {
      display: inline-block;
      background: #e8f4ff;
      border: 1px solid #b3d9ff;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      color: #0066cc;
    }
    .print-btn {
      display: block;
      margin: 32px auto 0;
      padding: 14px 40px;
      background: #0066ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
    }
    @media print {
      body { background: #fff; padding: 16px; }
      .print-btn { display: none; }
      .marker-sheet {
        break-inside: avoid;
        box-shadow: none;
        border: 1px solid #ccc;
      }
    }
  </style>
</head>
<body>
  <h1>🏥 院内案内ARデモ — マーカー印刷シート</html>
  <p class="sub">このシートを印刷し、各分岐点に貼り付けてください。受診者はiPhoneのカメラでスキャンします。</p>

  <div class="markers" id="markerList"></div>

  <button class="print-btn" onclick="window.print()">🖨️ 印刷する</button>

  <script>
    const markers = [
      { id: 'entrance-01', name: '正面玄関', emoji: '🚪' },
      { id: 'corridor-a',  name: 'A廊下（採血方面）', emoji: '🛤️' },
      { id: 'corridor-b',  name: 'B廊下（X線方面）', emoji: '🔀' }
    ];

    // ダミーQRパターン生成（見た目のみ）
    function makeQrPattern(seed) {
      let html = '';
      const rand = (n) => Math.abs(Math.sin(n * seed + 1)) > 0.5;
      for (let i = 0; i < 49; i++) {
        // corner blocks (top-left, top-right, bottom-left)
        const r = Math.floor(i / 7), c = i % 7;
        const inCorner =
          (r < 3 && c < 3) || (r < 3 && c > 3) || (r > 3 && c < 3);
        const isDark = inCorner || rand(i);
        html += `<div class="qr-cell ${isDark ? 'dark' : ''}"></div>`;
      }
      return html;
    }

    document.getElementById('markerList').innerHTML = markers.map((m, i) => `
      <div class="marker-sheet">
        <div class="marker-qr" style="font-size:24px; color:#fff; letter-spacing:0; line-height:1.4">
          <div class="qr-pattern">${makeQrPattern(i + 1)}</div>
        </div>
        <div class="marker-id">${m.id}</div>
        <div class="marker-name">${m.name}</div>
        <span class="marker-label">${m.emoji} 分岐点マーカー</span>
      </div>
    `).join('');
  </script>
</body>
</html>
